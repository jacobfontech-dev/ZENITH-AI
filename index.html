<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZENITH AI - Dark Luxury</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Orbitron', 'sans-serif'],
          },
          colors: {
            cosmo: '#000000',
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* Absolute Reset & Global Styles */
    html, body {
      background-color: #000000;
      color: #FFFFFF;
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    /* iOS Touch Optimization & Scrollbar Removal */
    .touch-target {
      touch-action: manipulation;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    /* Liquid Glass Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(64px);
      -webkit-backdrop-filter: blur(64px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.08);
    }

    /* Markdown Styling */
    .prose pre {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .prose code { font-family: monospace; font-size: 0.875rem; }
    .prose p { margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- CONFIGURATION ---
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyDSdCIvRE7nvZ11-pQGoosbCraE3xfKmhA",
      authDomain:        "zenith-ia-d800a.firebaseapp.com",
      projectId:         "zenith-ia-d800a",
      storageBucket:     "zenith-ia-d800a.firebasestorage.app",
      messagingSenderId: "1055549299285",
      appId:             "1:1055549299285:web:011b9307905ad1442b92dc",
      measurementId:     "G-MNX257C38L"
    };

    const ABACUS_API_KEY = "s2_d6f41c43993441c3bccffb38ee682d33";
    const ABACUS_ENDPOINT = "https://routellm.abacus.ai/v1/chat/completions";
    const AI_MODEL = "route-llm";

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- COMPONENTS ---

    // 1. Background Video (HLS)
    const BackgroundVideo = () => {
      const videoRef = useRef(null);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const videoSrc = "https://stream.mux.com/9JXDljEVWYwWu01PUkAemafDugK89o01BR6zqJ3aS9u00A.m3u8";

        if (Hls.isSupported()) {
          const hls = new Hls({ enableWorker: true });
          hls.loadSource(videoSrc);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => console.log("Autoplay blocked"));
          });
          return () => hls.destroy();
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = videoSrc;
          video.addEventListener('loadedmetadata', () => {
            video.play().catch(() => console.log("Autoplay blocked"));
          });
        }
      }, []);

      return (
        <div className="fixed inset-0 w-full h-full z-0 overflow-hidden bg-cosmo">
          <video
            ref={videoRef}
            className="absolute top-1/2 left-1/2 w-auto min-w-full min-h-full max-w-none transform -translate-x-1/2 -translate-y-1/2 opacity-40 object-cover"
            autoPlay
            loop
            muted
            playsInline
          />
          <div className="absolute inset-0 bg-cosmo/60 backdrop-blur-[2px]"></div>
        </div>
      );
    };

    // 2. Zenith Logo Component
    const ZenithLogo = ({ className = "text-5xl" }) => (
      <div className={`font-display font-bold tracking-[0.3em] text-white ${className}`}>
        ZENITH A<span style={{ display: 'inline-block', transform: 'translateY(7%)' }}>I</span>
      </div>
    );

    // 3. Auth Interface
    const AuthScreen = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      const handleGoogle = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await auth.signInWithPopup(provider);
        } catch (err) {
          setError(err.message);
        }
      };

      return (
        <div className="relative z-10 flex flex-col items-center justify-center h-full w-full px-6">
          <div className="mb-12 text-center">
            <ZenithLogo className="text-6xl md:text-8xl" />
            <p className="mt-4 text-white/40 tracking-[0.2em] uppercase text-xs">System Authorization</p>
          </div>

          <div className="glass-panel w-full max-w-md p-8 rounded-2xl relative z-50">
            <form onSubmit={handleLogin} className="flex flex-col gap-5">
              <div>
                <label className="block text-[10px] uppercase tracking-widest text-white/50 mb-2">Identification</label>
                <input 
                  type="email" 
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="w-full bg-transparent border border-white/20 text-white px-4 py-3 rounded text-sm glass-input transition-all touch-target"
                  placeholder="admin@zenith.ai"
                />
              </div>
              <div>
                <label className="block text-[10px] uppercase tracking-widest text-white/50 mb-2">Access Code</label>
                <input 
                  type="password" 
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full bg-transparent border border-white/20 text-white px-4 py-3 rounded text-sm glass-input transition-all touch-target"
                  placeholder="••••••••"
                />
              </div>
              
              {error && <p className="text-red-400 text-xs mt-1">{error}</p>}

              <button 
                type="submit" 
                disabled={loading}
                className="mt-4 w-full border border-white text-white hover:bg-white hover:text-cosmo transition-colors py-3 rounded uppercase tracking-[0.2em] text-xs font-bold touch-target z-50 relative"
              >
                {loading ? 'Authenticating...' : 'Initialize'}
              </button>
            </form>

            <div className="mt-8 flex items-center gap-4">
              <div className="h-[1px] flex-1 bg-white/10"></div>
              <span className="text-[10px] uppercase tracking-widest text-white/30">Or Connect</span>
              <div className="h-[1px] flex-1 bg-white/10"></div>
            </div>

            <button 
              onClick={handleGoogle}
              className="mt-6 w-full border border-white/20 text-white/80 hover:text-white hover:border-white/50 transition-colors py-3 rounded flex items-center justify-center gap-3 text-sm touch-target z-50 relative"
            >
              <svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google Access
            </button>
          </div>
        </div>
      );
    };

    // 4. Main Chat Interface
    const ChatInterface = ({ user }) => {
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([]);
      const [isStreaming, setIsStreaming] = useState(false);
      const messagesEndRef = useRef(null);
      const abortControllerRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, isStreaming]);

      const handleLogout = () => auth.signOut();

      const parseMarkdown = (text) => {
        return { __html: marked.parse(text) };
      };

      const handleSend = async () => {
        if (!input.trim() || isStreaming) return;
        
        const userMsg = { role: 'user', content: input };
        setMessages(prev => [...prev, userMsg]);
        setInput('');
        setIsStreaming(true);

        abortControllerRef.current = new AbortController();

        const contextMsgs = [
          { role: 'system', content: 'You are Zenith AI. You operate with absolute precision and adopt a dark, minimalist, and elite persona. Respond formatting with clean Markdown.' },
          ...messages,
          userMsg
        ];

        try {
          const response = await fetch(ABACUS_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${ABACUS_API_KEY}`
            },
            body: JSON.stringify({
              model: AI_MODEL,
              messages: contextMsgs,
              stream: true,
              temperature: 0.7
            }),
            signal: abortControllerRef.current.signal
          });

          if (!response.ok) throw new Error("Network response was not ok");

          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let aiResponse = "";
          
          setMessages(prev => [...prev, { role: 'assistant', content: '' }]);

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            
            for (const line of lines) {
              if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.choices[0].delta.content) {
                    aiResponse += data.choices[0].delta.content;
                    setMessages(prev => {
                      const newMsgs = [...prev];
                      newMsgs[newMsgs.length - 1].content = aiResponse;
                      return newMsgs;
                    });
                  }
                } catch (e) {}
              }
            }
          }
        } catch (error) {
          if (error.name !== 'AbortError') {
            console.error("Streaming error:", error);
          }
        } finally {
          setIsStreaming(false);
          abortControllerRef.current = null;
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const stopGeneration = () => {
        if (abortControllerRef.current) {
          abortControllerRef.current.abort();
          setIsStreaming(false);
        }
      };

      return (
        <div className="relative z-10 flex flex-col h-full w-full max-w-5xl mx-auto px-4 sm:px-6">
          {/* Header */}
          <header className="flex justify-between items-center py-6 flex-shrink-0">
            <ZenithLogo className="text-xl sm:text-2xl" />
            <div className="flex items-center gap-4">
              <span className="hidden sm:block text-[10px] uppercase tracking-widest text-white/40">{user.email}</span>
              <button onClick={handleLogout} className="text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-colors touch-target z-50 relative">Terminate</button>
            </div>
          </header>

          {/* Chat Display */}
          <main className="flex-1 overflow-y-auto mb-6 glass-panel rounded-2xl p-4 sm:p-8 flex flex-col gap-6 scroll-smooth">
            {messages.length === 0 ? (
              <div className="flex-1 flex flex-col items-center justify-center opacity-50">
                <ZenithLogo className="text-4xl opacity-20 mb-4" />
                <p className="text-xs uppercase tracking-widest">Awaiting Directive</p>
              </div>
            ) : (
              messages.map((msg, idx) => (
                <div key={idx} className={`flex w-full ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[85%] sm:max-w-[75%] rounded-xl p-4 sm:p-5 ${
                    msg.role === 'user' 
                      ? 'bg-white text-cosmo rounded-tr-sm' 
                      : 'bg-white/5 border border-white/10 text-white rounded-tl-sm prose prose-invert'
                  }`}>
                    {msg.role === 'user' ? (
                      <p className="text-sm whitespace-pre-wrap">{msg.content}</p>
                    ) : (
                      <div className="text-sm" dangerouslySetInnerHTML={parseMarkdown(msg.content)} />
                    )}
                  </div>
                </div>
              ))
            )}
            <div ref={messagesEndRef} />
          </main>

          {/* Input Area */}
          <footer className="mb-6 flex-shrink-0 relative z-50">
            <div className="relative flex items-end gap-3 glass-panel p-2 rounded-xl">
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Initialize command sequence..."
                className="flex-1 bg-transparent border-none text-white text-sm resize-none max-h-32 p-3 focus:outline-none placeholder-white/20 touch-target"
                rows="1"
                style={{ minHeight: '48px' }}
              />
              <div className="flex gap-2 pb-1 pr-1">
                {isStreaming ? (
                  <button 
                    onClick={stopGeneration}
                    className="h-10 w-10 flex items-center justify-center rounded border border-white/20 text-white/50 hover:text-white hover:border-white transition-colors touch-target"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
                  </button>
                ) : (
                  <button 
                    onClick={handleSend}
                    disabled={!input.trim()}
                    className="h-10 px-6 flex items-center justify-center rounded bg-white text-cosmo font-bold uppercase tracking-widest text-[10px] disabled:opacity-30 disabled:cursor-not-allowed hover:bg-white/90 transition-colors touch-target"
                  >
                    Send
                  </button>
                )}
              </div>
            </div>
            <div className="text-center mt-3">
              <span className="text-[9px] uppercase tracking-[0.3em] text-white/30">Secured via Route-LLM Backbone</span>
            </div>
          </footer>
        </div>
      );
    };

    // 5. Main App Controller
    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      if (loading) {
        return (
          <div className="h-full w-full bg-cosmo flex items-center justify-center text-white">
            <ZenithLogo className="text-2xl animate-pulse" />
          </div>
        );
      }

      return (
        <React.Fragment>
          <BackgroundVideo />
          {user ? <ChatInterface user={user} /> : <AuthScreen onLogin={() => {}} />}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
